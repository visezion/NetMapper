# See
#   - https://github.com/netbox-community/netbox-docker/blob/release/README.md
#   - https://github.com/netbox-community/netbox-docker/wiki/Using-Netbox-Plugins
# git clone https://github.com/netbox-community/netbox-docker/
# Edit files
# docker-compose build --no-cache
# docker-compose up -d

services:
  netbox:
    ports:
      - 8000:8080
    build:
      context: ${NETDOC_PATH:-../netdoc}
      dockerfile: docker/Dockerfile-Plugins
    volumes:
      - ${NETDOC_PATH:-../netdoc}/docker/configuration/plugins.py:/etc/netbox/config/plugins.py:ro
    image: netbox:${NETDOC_IMAGE_TAG:-latest-plugins}
  netbox-worker:
    image: netbox:${NETDOC_IMAGE_TAG:-latest-plugins}
    build:
      context: ${NETDOC_PATH:-../netdoc}
      dockerfile: docker/Dockerfile-Plugins
    volumes:
      - ${NETDOC_PATH:-../netdoc}/docker/configuration/plugins.py:/etc/netbox/config/plugins.py:ro
